<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: block;">
    <div class="auth-container">
        <div class="auth-card" style="max-width: 480px; padding: 30px;">
            <h1 class="auth-title">Create Profile</h1>
            <p class="auth-subtitle">Initialize your personalized AI Study Assistant</p>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div style="background-color: rgba(239, 68, 68, 0.15); border: 1px solid var(--color-danger); color: #fca5a5; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form action="/register" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="e.g. Namit Sharma" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Choose a unique username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="student_class">Select Class / Stream</label>
                    <select id="student_class" name="student_class" class="form-select" required>
                        <option value="Class 10">Class 10 (Secondary School)</option>
                        <option value="Class 12 Science" selected>Class 12 (Science Stream)</option>
                        <option value="Class 12 Commerce">Class 12 (Commerce Stream)</option>
                        <option value="Class 12 Humanities">Class 12 (Humanities Stream)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Register & Continue</button>
            </form>
            
            <p class="auth-footer">
                Already have an account? <a href="/login">Log In</a>
            </p>
        </div>
    </div>
</body>
</html>
