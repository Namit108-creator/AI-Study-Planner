<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Study Planner{% endblock %}</title>
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">AI</div>
                <div class="logo-text">Study Planner</div>
            </div>
            
            <nav>
                <ul class="menu-list">
                    <li class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">
                        <a href="/dashboard">
                            <span class="menu-icon">📊</span> Dashboard
                        </a>
                    </li>
                    <li class="menu-item {% if active_page == 'calendar' %}active{% endif %}">
                        <a href="/calendar">
                            <span class="menu-icon">📅</span> 30-Day Calendar
                        </a>
                    </li>
                    <li class="menu-item {% if active_page == 'progress' %}active{% endif %}">
                        <a href="/progress">
                            <span class="menu-icon">📈</span> Progress Tracker
                        </a>
                    </li>
                    <li class="menu-item {% if active_page == 'ai_advisor' %}active{% endif %}">
                        <a href="/ai-advisor">
                            <span class="menu-icon">🤖</span> AI Weakness Advisor
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="user-profile-summary">
                <div class="user-name">{{ session.get('name', 'Student') }}</div>
                <div class="user-class">Class: {{ session.get('class', 'N/A') }}</div>
                <a href="/logout" class="logout-btn">Log Out</a>
            </div>
        </aside>

        <!-- Main Body -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/voice.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
